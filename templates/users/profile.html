{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container" style="padding-top: 150px; min-height: 70vh;">
    <h1 class="text-white mb-4">Личный кабинет</h1>
    <p class="text-white-50">Здесь будет информация о пользователе и его бронированиях.</p>

    {% if user.is_authenticated %}
        <p class="text-warning">Привет, {{ user.username }}!</p>
        <a href="{% url 'logout' %}" class="btn btn-danger">Выйти</a>
    {% else %}
        <p class="text-danger">Вы не авторизованы.</p>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#loginModal">
            Войти
        </button>
    {% endif %}
</div>
{% endblock content %}
