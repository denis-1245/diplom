{% extends "base.html" %}
{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            {% if validlink %}
            <div class="card bg-dark text-white border-warning p-4 shadow-lg">
                <h3 class="text-warning text-center">Новый пароль</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="password" name="new_password1" class="form-control bg-secondary text-white border-0 mb-2" placeholder="Придумайте пароль" required>
                        <input type="password" name="new_password2" class="form-control bg-secondary text-white border-0" placeholder="Повторите пароль" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold">Сменить пароль</button>
                </form>
            </div>
            {% else %}
            <div class="alert alert-danger">Ссылка для сброса недействительна или уже использовалась.</div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
