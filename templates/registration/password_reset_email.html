<!DOCTYPE html>
<html>
<body style="background-color: #111; color: #fff; font-family: Arial, sans-serif; padding: 20px;">
    <h2 style="color: #ffc107;">BuzzBee</h2>
    <p>Здравствуйте!</p>
    <p>Вы запросили восстановление пароля для аккаунта: <strong>{{ user.get_username }}</strong></p>
    <p>Чтобы установить новый пароль, нажмите на кнопку ниже:</p>
    <div style="margin: 30px 0;">
        <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" 
           style="background-color: #ffc107; color: #000; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">
           СБРОСИТЬ ПАРОЛЬ
        </a>
    </div>
    <p style="color: #888; font-size: 12px;">Если вы не запрашивали это письмо, просто проигнорируйте его.</p>
</body>
</html>
